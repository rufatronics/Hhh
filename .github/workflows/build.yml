name: Android CI (build)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Clone PrismML Llama runtime
        run: |
          git clone --depth 1 -b prism https://github.com/PrismML-Eng/llama.cpp.git
          chmod +x scripts/patch_llama.sh
          ./scripts/patch_llama.sh

      - name: Download Bonsai model and tokenizer
        run: |
          chmod +x scripts/download_model.sh
          ./scripts/download_model.sh

      - name: Build APKs (Debug and Release)
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease

      - name: Generate checksums
        run: |
          sha256sum app/build/outputs/apk/debug/app-debug.apk >> checksums.txt
          sha256sum app/build/outputs/apk/release/app-release.apk >> checksums.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tinol-build
          path: |
            app/build/outputs/apk/
            checksums.txt

name: Android CI (build)

on:
  push:
    branches: [ main, feat/tinol-android-app ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"

      - name: Enable KVM group permissions
        run: |
          echo 'Check KVM'
          ls -l /dev/kvm || true
          sudo chmod 666 /dev/kvm || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore app/keystore.jks -alias key0 -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=tinol, OU=aga, O=tinol, L=Tinol, S=Tinol, C=US"

      - name: Clone PrismML Llama runtime
        run: |
          git clone --depth 1 -b prism https://github.com/PrismML-Eng/llama.cpp.git
          chmod +x scripts/patch_llama.sh
          ./scripts/patch_llama.sh

      - name: Download Bonsai model and tokenizer
        run: |
          chmod +x scripts/download_model.sh
          ./scripts/download_model.sh

      - name: Package assets
        run: |
          chmod +x scripts/package_assets.sh
          ./scripts/package_assets.sh

      - name: Build APKs (Debug and Release)
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease assembleDebugAndroidTest

      - name: Run UI Tests and Capture Logcat
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-load -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb logcat -c
            if ./gradlew connectedCheck; then
              echo "=== EXTRACTING EMULATOR CONVERSATION LOGS ==="
              adb logcat -d -s TinolTestLog BonsaiNative
              echo "=== GENERATING testresult.md ==="
              echo "# Android Emulator Conversation Test Results" > testresult.md
              echo "" >> testresult.md
              echo "### Full Conversation Logs" >> testresult.md
              echo "" >> testresult.md
              echo "```" >> testresult.md
              adb logcat -d -s TinolTestLog | grep -E "USER_PROMPT|BOT_RESPONSE" >> testresult.md || true
              echo "```" >> testresult.md
              cat testresult.md
            else
              echo "=== UI TESTS FAILED! CAPTURING CRASH LOGS ==="
              adb logcat -d -s TinolTestLog BonsaiNative AndroidRuntime libc
              /usr/bin/false
            fi

      - name: Commit testresult.md to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add testresult.md || true
          git commit -m "chore: update testresult.md with emulator conversation logs [skip ci]" || true
          git push origin HEAD:${{ github.ref_name }} || true

      - name: Verify APK presence
        run: |
          echo "Listing all APKs found:"
          find app/build/outputs/apk -name "*.apk"

      - name: Upload to Appetize.io
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -f "$APK_PATH" ]; then
            echo "Uploading signed $APK_PATH to Appetize.io..."
            curl https://api.appetize.io/v1/apps               -u "${{ secrets.APPETIZE_TOKEN }}:"               -F "file=@$APK_PATH"               -F "platform=android"
          else
            echo "Release APK not found for Appetize upload."
            /usr/bin/false
          fi

      - name: Generate checksums
        run: |
          find app/build/outputs/apk -name "*.apk" -exec sha256sum {} + >> checksums.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tinol-apks
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
            checksums.txt
            testresult.md

name: Release

on:
  push:
    branches: [ main, feat/tinol-android-app ]
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"

      - name: Build and Package
        run: |
          git clone --depth 1 -b prism https://github.com/PrismML-Eng/llama.cpp.git
          chmod +x scripts/*.sh
          ./scripts/patch_llama.sh
          ./scripts/download_model.sh
          ./scripts/package_assets.sh
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APKs for clarity
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -f "$APK_PATH" ]; then
             cp "$APK_PATH" tinol-release.apk
          else
             echo "Release APK not found."
             /usr/bin/false
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('latest-{0}', github.sha) }}
          files: |
            tinol-release.apk
          generate_release_notes: true
